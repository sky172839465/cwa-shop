name: Deploy Redirect to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create redirect files
        run: |
          mkdir public
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <link rel="canonical" href="https://cwa-shop.sky172839465.workers.dev/">
              <meta http-equiv="refresh" content="0; url=https://cwa-shop.sky172839465.workers.dev/">
            </head>
            <body>
              <h1>Redirecting...</h1>
              <p>If you are not redirected, <a href="https://cwa-shop.sky172839465.workers.dev/">click here</a>.</p>
              <script>
                window.location.replace("https://cwa-shop.sky172839465.workers.dev/");
              </script>
            </body>
          </html>
          EOF
          cp public/index.html public/404.html
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
